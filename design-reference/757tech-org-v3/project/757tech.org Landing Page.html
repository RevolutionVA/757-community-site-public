<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>757tech — The front door for tech in Hampton Roads</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Fredoka:wght@500;600;700&family=Outfit:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --deep: #07314A;
    --deep-2: #0a4a70;
    --tide: #0AB6D6;
    --seafoam: #5FD0BE;
    --sand: #F2E6CE;
    --sand-soft: #FBF6EC;
    --coral: #FF6F59;
    --ink: #0c2536;
    --muted: #5b7280;
    --line: #e7ded0;
    --accent: #FF6F59;
    --font-head: 'Baloo 2', system-ui, sans-serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --radius: 18px;
    --shadow-sm: 0 2px 8px rgba(7,49,74,.06);
    --shadow: 0 14px 40px -16px rgba(7,49,74,.28);
    --shadow-lg: 0 30px 70px -24px rgba(7,49,74,.4);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font-body);
    color: var(--ink);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  h1, h2, h3, h4 { font-family: var(--font-head); margin: 0; line-height: 1.04; letter-spacing: -.01em; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  ::selection { background: var(--seafoam); color: var(--deep); }

  .app { overflow-x: clip; }

  /* ---------- buttons ---------- */
  .btn-coral {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 16px;
    padding: 13px 22px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 8px 20px -8px color-mix(in srgb, var(--accent) 70%, transparent);
    transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .btn-coral:hover { transform: translateY(-2px); box-shadow: 0 14px 26px -10px color-mix(in srgb, var(--accent) 75%, transparent); filter: brightness(1.04); }
  .btn-coral:active { transform: translateY(0); }
  .btn-ghost {
    background: #fff; color: var(--deep); border: 1.5px solid var(--line);
    font-family: var(--font-head); font-weight: 700; font-size: 15px;
    padding: 11px 20px; border-radius: 999px; cursor: pointer; transition: all .15s ease;
  }
  .btn-ghost:hover { border-color: var(--tide); color: var(--tide); }
  .btn-ghost-dark {
    background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.45);
    font-family: var(--font-head); font-weight: 700; font-size: 16px;
    padding: 13px 22px; border-radius: 999px; cursor: pointer; transition: all .15s ease;
  }
  .btn-ghost-dark:hover { background: rgba(255,255,255,.12); border-color: #fff; }

  /* ---------- header ---------- */
  .site-header {
    position: sticky; top: 0; z-index: 50;
    transition: background .25s ease, box-shadow .25s ease, padding .25s ease;
    padding: 14px 0;
  }
  .site-header.scrolled { background: rgba(255,255,255,.88); backdrop-filter: blur(12px); box-shadow: 0 1px 0 var(--line), var(--shadow-sm); padding: 8px 0; }
  .header-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 28px;
    display: flex; align-items: center; gap: 24px;
  }
  .brand img { height: 64px; width: auto; transition: height .25s ease; }
  .site-header.scrolled .brand img { height: 50px; }
  .nav { display: flex; gap: 28px; margin-left: auto; }
  .nav a { font-weight: 600; font-size: 15.5px; color: var(--deep); position: relative; padding: 4px 0; opacity: .82; transition: opacity .15s; }
  .nav a:hover { opacity: 1; }
  .nav a::after { content: ""; position: absolute; left: 0; right: 100%; bottom: -2px; height: 2px; background: var(--tide); transition: right .2s ease; border-radius: 2px; }
  .nav a:hover::after { right: 0; }
  .header-cta { padding: 10px 20px; font-size: 15px; }

  .header-social { display: flex; gap: 7px; align-items: center; }
  .social-ico { width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; color: var(--deep); border: 1.5px solid var(--line); background: #fff; transition: all .15s ease; }
  .social-ico:hover { transform: translateY(-2px); border-color: transparent; color: #fff; box-shadow: var(--shadow-sm); }
  .social-ico.slack:hover { background: #4A154B; }
  .social-ico.discord:hover { background: #5865F2; }
  @media (max-width: 920px) { .header-social { display: none; } }

  @media (max-width: 760px) { .nav { display: none; } }

  /* ---------- hero shared ---------- */
  .hero { position: relative; }
  .eyebrow {
    display: inline-block; font-family: var(--font-head); font-weight: 700;
    font-size: 14px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--tide); margin-bottom: 18px;
    padding: 6px 14px; border-radius: 999px; background: color-mix(in srgb, var(--tide) 12%, #fff);
  }
  .eyebrow.dark { color: var(--seafoam); background: rgba(95,208,190,.16); }
  .hero h1 { font-size: clamp(38px, 6vw, 72px); font-weight: 800; color: var(--deep); }
  .hero h1 .hl { color: var(--tide); position: relative; white-space: nowrap; }
  .hero-sub { font-size: clamp(17px, 1.6vw, 21px); color: var(--muted); max-width: 560px; margin: 22px 0 28px; line-height: 1.55; }
  .hero-mini { font-size: 13.5px; color: var(--muted); margin-top: 14px; font-weight: 500; }
  .wave-divider { position: absolute; bottom: -1px; left: 0; width: 100%; height: clamp(60px, 8vw, 110px); display: block; }

  /* hero — wave banner (deep gradient) */
  .hero-wave {
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(95,208,190,.35), transparent 60%),
      radial-gradient(900px 500px at 10% 0%, rgba(10,182,214,.4), transparent 55%),
      linear-gradient(165deg, var(--deep) 0%, #0a3f5e 55%, #0c4d6e 100%);
    color: #fff; padding: clamp(64px, 9vw, 120px) 28px clamp(110px, 13vw, 170px);
    text-align: center; overflow: hidden;
  }
  .hero-wave::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.5) 1px, transparent 1.4px);
    background-size: 26px 26px; opacity: .06; pointer-events: none;
  }
  .hero-wave-inner { max-width: 820px; margin: 0 auto; position: relative; }
  .hero-wave h1 { color: #fff; }
  .hero-wave h1 .hl { color: var(--seafoam); }
  .hero-wave .hero-sub { color: rgba(255,255,255,.82); margin-left: auto; margin-right: auto; }
  .center-capture { display: flex; justify-content: center; }
  .hero-stats { display: flex; gap: clamp(24px, 5vw, 64px); justify-content: center; margin-top: 48px; flex-wrap: wrap; }
  .hero-stat-v { font-family: var(--font-head); font-weight: 800; font-size: clamp(30px, 4vw, 46px); color: var(--seafoam); line-height: 1; }
  .hero-stat-l { font-size: 13.5px; color: rgba(255,255,255,.7); margin-top: 7px; font-weight: 500; letter-spacing: .02em; }

  /* hero — split */
  .hero-split { background: linear-gradient(180deg, #fff 0%, var(--sand-soft) 100%); padding: clamp(40px, 6vw, 80px) 28px clamp(90px, 11vw, 150px); }
  .hero-split-grid { max-width: 1160px; margin: 0 auto; display: grid; grid-template-columns: 1.05fr .95fr; gap: clamp(32px, 5vw, 72px); align-items: center; }
  .hero-peek { background: #fff; border: 1px solid var(--line); border-radius: 24px; padding: 22px; box-shadow: var(--shadow); }
  .peek-label { font-family: var(--font-head); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--coral); margin-bottom: 14px; }
  .peek-all { margin-top: 16px; background: none; border: none; color: var(--tide); font-family: var(--font-head); font-weight: 700; font-size: 15px; cursor: pointer; padding: 0; }
  .peek-all:hover { text-decoration: underline; }

  /* next-event peek card */
  .next-card { display: flex; gap: 14px; align-items: flex-start; padding: 14px; border-radius: 16px; background: var(--sand-soft); border: 1px solid var(--line); transition: transform .15s, box-shadow .15s; }
  .next-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
  .next-date { flex-shrink: 0; width: 60px; text-align: center; border-radius: 13px; padding: 9px 0; line-height: 1; }
  .nd-dow { display: block; font-family: var(--font-head); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .nd-day { display: block; font-family: var(--font-head); font-weight: 800; font-size: 26px; margin: 2px 0; }
  .nd-mon { display: block; font-family: var(--font-head); font-weight: 600; font-size: 11px; text-transform: uppercase; opacity: .85; }
  .next-body { flex: 1; min-width: 0; }
  .next-group { font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--deep); margin: 7px 0 1px; }
  .next-title { font-size: 14px; color: var(--muted); line-height: 1.4; }
  .next-meta { font-size: 12.5px; color: var(--ink); margin-top: 8px; font-weight: 500; }
  @media (max-width: 860px) { .hero-split-grid { grid-template-columns: 1fr; } }

  /* hero — spotlight */
  .hero-spotlight { background: linear-gradient(170deg, var(--sand) 0%, #f7ede0 60%, #fdf8f1 100%); padding: clamp(56px, 8vw, 110px) 28px clamp(90px, 11vw, 150px); text-align: center; overflow: hidden; position: relative; }
  .hero-center { max-width: 780px; margin: 0 auto; position: relative; z-index: 2; }
  .hero-spotlight .eyebrow.dark { color: var(--deep); background: rgba(7,49,74,.08); }
  .spotlight-chips { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .float-chip {
    position: absolute; font-family: var(--font-head); font-weight: 700; font-size: 15px;
    padding: 9px 16px; border-radius: 999px; background: #fff;
    color: oklch(0.45 0.12 var(--h, 200)); border: 1.5px solid color-mix(in srgb, oklch(0.6 0.13 var(--h, 200)) 30%, #fff);
    box-shadow: var(--shadow-sm); opacity: .92;
    animation: floaty 7s ease-in-out infinite;
  }
  .fc0 { top: 12%; left: 7%; } .fc1 { top: 22%; right: 8%; animation-delay: -1.5s; }
  .fc2 { top: 54%; left: 4%; animation-delay: -3s; } .fc3 { top: 66%; right: 6%; animation-delay: -2s; }
  .fc4 { top: 40%; left: 11%; animation-delay: -4s; } .fc5 { top: 78%; left: 46%; animation-delay: -2.6s; }
  @keyframes floaty { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-14px) rotate(2deg); } }
  @media (prefers-reduced-motion: reduce) { .float-chip { animation: none; } }
  @media (max-width: 860px) { .spotlight-chips { display: none; } }

  /* ---------- email capture ---------- */
  .capture { display: flex; gap: 8px; max-width: 460px; }
  .capture.coral, .capture.onDeep { margin: 0 auto; }
  .capture input {
    flex: 1; min-width: 0; font-family: var(--font-body); font-size: 16px;
    padding: 14px 18px; border-radius: 999px; border: 1.5px solid var(--line);
    background: #fff; color: var(--ink); outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .capture input:focus { border-color: var(--tide); box-shadow: 0 0 0 4px color-mix(in srgb, var(--tide) 18%, transparent); }
  .capture button {
    background: var(--accent); color: #fff; border: none; font-family: var(--font-head);
    font-weight: 700; font-size: 16px; padding: 14px 24px; border-radius: 999px; cursor: pointer;
    white-space: nowrap; box-shadow: 0 8px 18px -8px color-mix(in srgb, var(--accent) 70%, transparent);
    transition: transform .15s, filter .15s;
  }
  .capture button:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .capture.onDeep input { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.3); color: #fff; }
  .capture.onDeep input::placeholder { color: rgba(255,255,255,.6); }
  .capture.onDeep input:focus { border-color: var(--seafoam); background: rgba(255,255,255,.16); box-shadow: 0 0 0 4px rgba(95,208,190,.25); }
  .capture-done { font-family: var(--font-head); font-weight: 700; font-size: 17px; display: flex; align-items: center; gap: 10px; color: var(--seafoam); }
  .capture-done.light { color: var(--deep); }
  .capture-done .check { display: inline-grid; place-items: center; width: 28px; height: 28px; border-radius: 50%; background: var(--seafoam); color: var(--deep); font-size: 15px; }
  .capture-done.coral, .capture-done.onDeep { justify-content: center; }

  /* ---------- sections ---------- */
  .section { max-width: 1200px; margin: 0 auto; padding: clamp(64px, 9vw, 104px) 28px; }
  .section-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 32px; margin-bottom: 38px; flex-wrap: wrap; }
  .kicker { font-family: var(--font-head); font-weight: 700; font-size: 13.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--coral); display: block; margin-bottom: 10px; }
  .kicker.light { color: var(--seafoam); }
  .section-head h2 { font-size: clamp(30px, 4vw, 46px); font-weight: 800; color: var(--deep); }
  .section-lead { color: var(--muted); font-size: 17px; max-width: 440px; margin: 0; line-height: 1.55; }

  /* ---------- explorer bar ---------- */
  .explorer-bar { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
  .filter-chips { display: flex; gap: 9px; flex-wrap: wrap; }
  .filter-chips.center { justify-content: center; margin-bottom: 34px; }
  .chip {
    font-family: var(--font-head); font-weight: 600; font-size: 14.5px;
    padding: 8px 15px; border-radius: 999px; border: 1.5px solid var(--line);
    background: #fff; color: var(--deep); cursor: pointer; transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .chip:hover { border-color: var(--tide); }
  .chip.active { background: var(--deep); border-color: var(--deep); color: #fff; }
  .chip-count { font-size: 12px; background: color-mix(in srgb, var(--tide) 16%, #fff); color: var(--deep); padding: 1px 7px; border-radius: 999px; font-weight: 700; }
  .chip.active .chip-count { background: rgba(255,255,255,.2); color: #fff; }

  .explorer-tools { display: flex; gap: 12px; align-items: center; }
  .search { position: relative; display: flex; align-items: center; }
  .search-ico { position: absolute; left: 14px; font-size: 18px; color: var(--muted); pointer-events: none; }
  .search input {
    font-family: var(--font-body); font-size: 15px; padding: 11px 14px 11px 38px;
    border-radius: 999px; border: 1.5px solid var(--line); background: #fff; outline: none;
    width: 240px; transition: border-color .15s, box-shadow .15s;
  }
  .search input:focus { border-color: var(--tide); box-shadow: 0 0 0 4px color-mix(in srgb, var(--tide) 16%, transparent); }
  .search-clear { position: absolute; right: 10px; background: none; border: none; font-size: 18px; color: var(--muted); cursor: pointer; line-height: 1; }
  .view-toggle { display: flex; background: var(--sand-soft); border: 1.5px solid var(--line); border-radius: 999px; padding: 3px; }
  .view-toggle button { font-family: var(--font-head); font-weight: 600; font-size: 14px; border: none; background: none; padding: 7px 16px; border-radius: 999px; cursor: pointer; color: var(--muted); }
  .view-toggle button.active { background: #fff; color: var(--deep); box-shadow: var(--shadow-sm); }

  /* ---------- event cards ---------- */
  .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  @media (max-width: 480px) { .event-grid { grid-template-columns: 1fr; } }
  .event-card {
    display: flex; gap: 16px; padding: 18px; background: #fff; border: 1px solid var(--line);
    border-radius: 18px; align-items: flex-start; position: relative; transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .event-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: transparent; }
  .ec-date {
    flex-shrink: 0; width: 58px; text-align: center; background: var(--sand-soft);
    border-radius: 14px; padding: 9px 0; line-height: 1;
  }
  .ec-dow { display: block; font-size: 11px; font-weight: 700; color: var(--coral); text-transform: uppercase; letter-spacing: .05em; }
  .ec-day { display: block; font-family: var(--font-head); font-weight: 800; font-size: 25px; color: var(--deep); margin: 3px 0; }
  .ec-mon { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
  .ec-body { flex: 1; min-width: 0; }
  .ec-top { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .ec-rel { font-size: 12.5px; font-weight: 600; color: var(--muted); margin-left: auto; }
  .ec-group { font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--deep); }
  .ec-title { font-size: 14.5px; color: var(--muted); margin: 3px 0 9px; line-height: 1.4; }
  .ec-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--ink); margin-bottom: 10px; }
  .ec-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .ec-tag { font-size: 11.5px; font-weight: 600; color: var(--deep-2); background: color-mix(in srgb, var(--seafoam) 20%, #fff); padding: 3px 9px; border-radius: 999px; }
  .ec-arrow { position: absolute; top: 16px; right: 16px; color: var(--tide); font-weight: 700; opacity: 0; transform: translateX(-4px); transition: all .15s; }
  .event-card:hover .ec-arrow { opacity: 1; transform: translateX(0); }

  .cat-badge { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-head); font-weight: 700; padding: 3px 10px; border-radius: 999px; }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* ---------- calendar (week view) ---------- */
  .calendar { background: #fff; border: 1px solid var(--line); border-radius: 22px; padding: 22px; box-shadow: var(--shadow-sm); }
  .cal-head { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 20px; position: relative; }
  .cal-title { font-family: var(--font-head); font-weight: 700; font-size: 21px; color: var(--deep); text-align: center; line-height: 1.1; min-width: 220px; }
  .cal-sub { display: block; font-family: var(--font-body); font-weight: 500; font-size: 13px; color: var(--muted); margin-top: 3px; letter-spacing: 0; }
  .cal-nav { width: 38px; height: 38px; flex-shrink: 0; border-radius: 50%; border: 1.5px solid var(--line); background: #fff; font-size: 20px; color: var(--deep); cursor: pointer; transition: all .15s; }
  .cal-nav:hover { background: var(--deep); color: #fff; border-color: var(--deep); }
  .cal-today-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-family: var(--font-head); font-weight: 700; font-size: 13px; color: var(--tide); background: color-mix(in srgb, var(--tide) 10%, #fff); border: 1.5px solid color-mix(in srgb, var(--tide) 35%, #fff); padding: 7px 13px; border-radius: 999px; cursor: pointer; transition: all .15s; }
  .cal-today-btn:hover { background: var(--tide); color: #fff; }

  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; align-items: start; }
  .week-col { background: var(--sand-soft); border-radius: 14px; overflow: hidden; min-height: 120px; display: flex; flex-direction: column; }
  .week-col.empty { background: transparent; }
  .week-col.today { box-shadow: inset 0 0 0 2px var(--coral); background: color-mix(in srgb, var(--coral) 6%, #fff); }
  .week-col-head { text-align: center; padding: 10px 4px 8px; border-bottom: 1px solid color-mix(in srgb, var(--line) 70%, transparent); }
  .week-col.empty .week-col-head { border-bottom-color: transparent; }
  .wc-dow { display: block; font-family: var(--font-head); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .wc-day { display: block; font-family: var(--font-head); font-weight: 800; font-size: 22px; color: var(--deep); line-height: 1.1; }
  .week-col.empty .wc-day { color: color-mix(in srgb, var(--muted) 55%, #fff); }
  .wc-today { display: inline-block; font-family: var(--font-head); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #fff; background: var(--coral); padding: 1px 7px; border-radius: 999px; margin-top: 3px; }
  .week-col-body { padding: 8px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .week-ev { display: block; background: #fff; border: 1px solid var(--line); border-left: 3px solid var(--c, var(--tide)); border-radius: 10px; padding: 9px 10px; transition: transform .12s, box-shadow .12s; }
  .week-ev:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); border-color: transparent; border-left-color: var(--c, var(--tide)); }
  .we-time { font-family: var(--font-head); font-weight: 700; font-size: 12px; color: var(--c, var(--tide)); filter: saturate(.9) brightness(.85); }
  .we-group { font-family: var(--font-head); font-weight: 700; font-size: 13px; color: var(--deep); line-height: 1.2; margin: 2px 0 1px; }
  .we-title { font-size: 12px; color: var(--muted); line-height: 1.35; }
  .we-loc { font-size: 11.5px; color: var(--muted); margin-top: 4px; font-weight: 600; }
  .we-loc::before { content: "📍 "; }
  .week-empty { text-align: center; color: color-mix(in srgb, var(--muted) 45%, #fff); font-size: 18px; padding: 8px 0; }
  .cal-hint { text-align: center; color: var(--muted); font-size: 14px; margin-top: 18px; }

  @media (max-width: 860px) {
    .week-grid { grid-template-columns: 1fr; gap: 6px; }
    .week-col { min-height: 0; flex-direction: row; align-items: stretch; }
    .week-col.empty { display: none; }
    .week-col-head { display: flex; flex-direction: column; justify-content: center; min-width: 64px; border-bottom: none; border-right: 1px solid color-mix(in srgb, var(--line) 70%, transparent); }
    .week-col-body { flex-direction: row; flex-wrap: wrap; }
    .week-ev { flex: 1; min-width: 180px; }
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { margin: 0 0 18px; font-size: 16px; }

  /* ---------- conferences ---------- */
  .conf-section { background: var(--sand-soft); max-width: none; }
  .conf-section > .section-head, .conf-section > .conf-grid { max-width: 1200px; margin-left: auto; margin-right: auto; }
  .conf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 22px; }
  .conf-card { background: #fff; border: 1px solid var(--line); border-radius: 20px; overflow: hidden; transition: transform .15s, box-shadow .15s; display: flex; flex-direction: column; }
  .conf-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
  .conf-photo {
    height: 150px; position: relative; display: grid; place-items: center;
    background:
      repeating-linear-gradient(135deg, color-mix(in srgb, var(--tide) 14%, #fff) 0 12px, color-mix(in srgb, var(--seafoam) 14%, #fff) 12px 24px);
  }
  .ph-label { font-family: 'DM Mono', ui-monospace, monospace; font-size: 12px; color: var(--deep-2); opacity: .55; letter-spacing: .03em; }
  .conf-month { position: absolute; top: 12px; left: 12px; background: var(--deep); color: #fff; font-family: var(--font-head); font-weight: 700; font-size: 12.5px; padding: 5px 12px; border-radius: 999px; }
  .conf-body { padding: 18px; display: flex; flex-direction: column; flex: 1; }
  .conf-body h3 { font-size: 22px; font-weight: 700; color: var(--deep); }
  .conf-loc { font-size: 13px; color: var(--muted); margin: 7px 0 10px; }
  .conf-body p { font-size: 14px; color: var(--ink); line-height: 1.5; margin: 0 0 14px; flex: 1; }
  .conf-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .conf-tag { font-size: 11.5px; font-weight: 600; color: var(--deep-2); background: var(--sand); padding: 3px 9px; border-radius: 999px; }

  /* ---------- groups ---------- */
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px; }
  .group-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: #fff; border: 1px solid var(--line); border-radius: 16px; transition: all .15s; }
  .group-card:hover { border-color: var(--tide); transform: translateX(3px); box-shadow: var(--shadow-sm); }
  .group-mark { flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; font-family: var(--font-head); font-weight: 800; font-size: 15px; }
  .group-info { flex: 1; min-width: 0; }
  .group-name { font-family: var(--font-head); font-weight: 700; font-size: 15px; color: var(--deep); line-height: 1.2; }
  .group-tags { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .group-arrow { color: var(--muted); font-weight: 700; transition: all .15s; }
  .group-card:hover .group-arrow { color: var(--tide); transform: translate(2px, -2px); }

  /* ---------- submit ---------- */
  .submit-section { max-width: 1200px; }
  .submit-card {
    background: linear-gradient(135deg, var(--deep) 0%, #0a4a6e 100%);
    border-radius: 28px; padding: clamp(36px, 5vw, 60px); color: #fff;
    display: grid; grid-template-columns: 1.4fr .6fr; gap: 40px; align-items: center;
    position: relative; overflow: hidden;
  }
  .submit-card::before { content: ""; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,.5) 1px, transparent 1.4px); background-size: 24px 24px; opacity: .06; }
  .submit-copy { position: relative; }
  .submit-copy h2 { font-size: clamp(28px, 3.4vw, 40px); font-weight: 800; color: #fff; }
  .submit-copy p { color: rgba(255,255,255,.82); font-size: 17px; max-width: 460px; margin: 14px 0 26px; line-height: 1.55; }
  .submit-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .submit-art { position: relative; height: 160px; }
  .art-wave { position: absolute; inset: 0; border-radius: 50%; background: radial-gradient(circle at 40% 35%, var(--seafoam), var(--tide) 70%); filter: blur(2px); opacity: .85; animation: pulse 5s ease-in-out infinite; }
  .art-chip { position: absolute; inset: 0; margin: auto; width: 76px; height: 76px; background: #fff; border-radius: 20px; display: grid; place-items: center; font-family: var(--font-head); font-weight: 800; font-size: 40px; color: var(--coral); box-shadow: var(--shadow-lg); }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @media (prefers-reduced-motion: reduce) { .art-wave { animation: none; } }
  @media (max-width: 720px) { .submit-card { grid-template-columns: 1fr; } .submit-art { display: none; } }

  /* ---------- newsletter ---------- */
  .news-section {
    max-width: none;
    background:
      radial-gradient(900px 400px at 85% 120%, rgba(95,208,190,.3), transparent 60%),
      radial-gradient(700px 400px at 10% -20%, rgba(10,182,214,.32), transparent 55%),
      linear-gradient(160deg, var(--deep) 0%, #0a4364 100%);
    color: #fff; text-align: center; position: relative; overflow: hidden;
  }
  .news-section::before { content: ""; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,.5) 1px, transparent 1.4px); background-size: 26px 26px; opacity: .05; }
  .news-inner { max-width: 640px; margin: 0 auto; position: relative; }
  .news-section h2 { font-size: clamp(30px, 4.4vw, 50px); font-weight: 800; color: #fff; margin: 6px 0 0; }
  .news-section p { color: rgba(255,255,255,.82); font-size: 18px; margin: 20px auto 30px; max-width: 520px; line-height: 1.55; }
  .news-capture { display: flex; justify-content: center; }
  .news-mini { font-size: 13.5px; color: rgba(255,255,255,.62); margin-top: 16px; font-weight: 500; }

  /* ---------- footer ---------- */
  .site-footer { background: #fff; border-top: 1px solid var(--line); }
  .footer-inner { max-width: 1200px; margin: 0 auto; padding: 56px 28px 36px; display: grid; grid-template-columns: 1.4fr 1.6fr; gap: 48px; }
  .footer-brand img { height: 64px; margin-bottom: 16px; }
  .footer-brand p { color: var(--muted); font-size: 14.5px; max-width: 360px; line-height: 1.55; margin: 0; }
  .footer-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .footer-col h4 { font-family: var(--font-head); font-weight: 700; font-size: 14px; color: var(--deep); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
  .footer-col a { display: block; color: var(--muted); font-size: 14.5px; padding: 5px 0; transition: color .15s; }
  .footer-col a:hover { color: var(--tide); }
  .footer-base { max-width: 1200px; margin: 0 auto; padding: 20px 28px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 13.5px; color: var(--muted); }
  .footer-tag { font-family: var(--font-head); font-weight: 600; color: var(--deep); }
  @media (max-width: 720px) { .footer-inner { grid-template-columns: 1fr; gap: 32px; } }

  #root { min-height: 100vh; }
</style>
</head>
